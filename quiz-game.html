<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1115;
    --surface:#181B22;
    --surface-2:#20242E;
    --text:#F5F5F0;
    --text-dim:#9AA0AC;
    --amber:#FFB100;
    --teal:#00D9A3;
    --coral:#FF5470;
    --border:#2A2E38;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .card{
    width:100%;
    max-width:420px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:28px 24px;
    position:relative;
  }

  .screen{ display:none; }
  .screen.active{ display:block; }

  .eyebrow{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--teal);
    text-transform:uppercase;
    margin:0 0 10px;
  }

  h1.title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:32px;
    line-height:1.1;
    margin:0 0 12px;
  }

  .subtitle{
    color:var(--text-dim);
    font-size:14px;
    line-height:1.5;
    margin:0 0 24px;
  }

  .meta-row{
    display:flex;
    gap:16px;
    margin-bottom:28px;
  }

  .meta-pill{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-dim);
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:6px 10px;
  }

  .btn-primary{
    width:100%;
    background:var(--teal);
    color:#06231B;
    border:none;
    border-radius:12px;
    font-family:var(--font-display);
    font-weight:700;
    font-size:16px;
    padding:14px 18px;
    cursor:pointer;
    transition:transform 0.15s ease, opacity 0.15s ease;
  }
  .btn-primary:hover{ opacity:0.9; }
  .btn-primary:active{ transform:scale(0.98); }
  .btn-primary:focus-visible{ outline:2px solid var(--amber); outline-offset:3px; }

  .quiz-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-dim);
  }

  .score-tag{
    color:var(--amber);
  }

  .timer-track{
    height:6px;
    border-radius:4px;
    background:var(--surface-2);
    overflow:hidden;
    margin-bottom:8px;
  }

  .timer-fill{
    height:100%;
    width:100%;
    background:var(--teal);
    transition:width 1s linear, background-color 0.3s ease;
  }

  .timer-num{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-dim);
    text-align:right;
    margin-bottom:20px;
  }

  .question{
    font-family:var(--font-display);
    font-weight:700;
    font-size:20px;
    line-height:1.35;
    margin:0 0 20px;
    min-height:54px;
  }

  .options{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px,1fr));
    gap:10px;
  }

  .option{
    text-align:left;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:12px;
    color:var(--text);
    font-family:var(--font-body);
    font-size:14px;
    padding:14px 12px;
    cursor:pointer;
    display:flex;
    gap:10px;
    align-items:flex-start;
    transition:border-color 0.15s ease, background-color 0.15s ease;
  }
  .option:hover{ border-color:var(--text-dim); }
  .option:focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }
  .option[disabled]{ cursor:default; }

  .option-letter{
    font-family:var(--font-mono);
    font-weight:700;
    color:var(--text-dim);
    flex-shrink:0;
  }

  .option.correct{
    background:rgba(0,217,163,0.14);
    border-color:var(--teal);
  }
  .option.correct .option-letter{ color:var(--teal); }

  .option.wrong{
    background:rgba(255,84,112,0.14);
    border-color:var(--coral);
  }
  .option.wrong .option-letter{ color:var(--coral); }

  .results-label{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--text-dim);
    text-transform:uppercase;
    text-align:center;
    margin:0 0 6px;
  }

  .score-big{
    font-family:var(--font-mono);
    font-weight:700;
    font-size:64px;
    text-align:center;
    color:var(--amber);
    margin:0 0 4px;
    line-height:1;
  }

  .score-sub{
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
    margin:0 0 28px;
  }

  .stat-row{
    display:flex;
    justify-content:center;
    gap:24px;
    margin-bottom:28px;
  }

  .stat{
    text-align:center;
  }
  .stat-num{
    font-family:var(--font-mono);
    font-size:22px;
    font-weight:700;
  }
  .stat-label{
    font-size:11px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin-top:2px;
  }
  .stat-correct .stat-num{ color:var(--teal); }
  .stat-wrong .stat-num{ color:var(--coral); }

  @media (prefers-reduced-motion: reduce){
    .timer-fill, .btn-primary, .option{ transition:none; }
  }
</style>
</head>
<body>

<div class="card">

  <div class="screen active" id="screen-start">
    <p class="eyebrow">Quick Quiz</p>
    <h1 class="title">Ready to test<br>your friends?</h1>
    <p class="subtitle">Multiple choice, 15 seconds a question. Answer fast, answer right.</p>
    <div class="meta-row">
      <span class="meta-pill" id="meta-count">10 questions</span>
      <span class="meta-pill">15s each</span>
    </div>
    <button class="btn-primary" id="btn-start">Start quiz</button>
  </div>

  <div class="screen" id="screen-quiz">
    <div class="quiz-top">
      <span id="progress-label">Q01 / 10</span>
      <span class="score-tag" id="score-label">SCORE 000</span>
    </div>
    <div class="timer-track">
      <div class="timer-fill" id="timer-fill"></div>
    </div>
    <div class="timer-num" id="timer-num">15s</div>
    <p class="question" id="question-text"></p>
    <div class="options" id="options-wrap"></div>
  </div>

  <div class="screen" id="screen-results">
    <p class="results-label">Final score</p>
    <p class="score-big" id="result-score">000</p>
    <p class="score-sub" id="result-sub">out of 100</p>
    <div class="stat-row">
      <div class="stat stat-correct">
        <div class="stat-num" id="result-correct">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat stat-wrong">
        <div class="stat-num" id="result-wrong">0</div>
        <div class="stat-label">Wrong</div>
      </div>
    </div>
    <button class="btn-primary" id="btn-restart">Play again</button>
  </div>

</div>

<script>
  const QUESTIONS = [
    { q:"What is the capital of Ghana?", options:["Kumasi","Accra","Tamale","Cape Coast"], correct:1 },
    { q:"Which planet is known as the Red Planet?", options:["Venus","Jupiter","Mars","Saturn"], correct:2 },
    { q:"What is the chemical symbol for water?", options:["WO2","H2O","HO2","H2O2"], correct:1 },
    { q:"In computing, what does CPU stand for?", options:["Computer Processing Unit","Central Processing Unit","Central Program Utility","Core Processing Unit"], correct:1 },
    { q:"How many continents are there on Earth?", options:["5","6","7","8"], correct:2 },
    { q:"What is the largest ocean on Earth?", options:["Atlantic","Indian","Arctic","Pacific"], correct:3 },
    { q:"Who developed the theory of relativity?", options:["Isaac Newton","Albert Einstein","Niels Bohr","Galileo Galilei"], correct:1 },
    { q:"What is the binary representation of the decimal number 2?", options:["01","10","11","00"], correct:1 },
    { q:"Which gas do plants absorb for photosynthesis?", options:["Oxygen","Nitrogen","Carbon dioxide","Hydrogen"], correct:2 },
    { q:"What does HTML stand for?", options:["HyperText Markup Language","HighText Machine Language","HyperTransfer Markup Language","Home Tool Markup Language"], correct:0 }
  ];

  const TIME_PER_Q = 15;
  const POINTS_PER_Q = 10;

  let current = 0;
  let score = 0;
  let correctCount = 0;
  let wrongCount = 0;
  let timeLeft = TIME_PER_Q;
  let timerInterval = null;
  let answered = false;

  const screens = {
    start: document.getElementById('screen-start'),
    quiz: document.getElementById('screen-quiz'),
    results: document.getElementById('screen-results')
  };

  function showScreen(name){
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  document.getElementById('meta-count').textContent = QUESTIONS.length + ' questions';

  function startQuiz(){
    current = 0;
    score = 0;
    correctCount = 0;
    wrongCount = 0;
    showScreen('quiz');
    showQuestion();
  }

  function showQuestion(){
    answered = false;
    const data = QUESTIONS[current];
    document.getElementById('progress-label').textContent =
      'Q' + String(current+1).padStart(2,'0') + ' / ' + QUESTIONS.length;
    document.getElementById('score-label').textContent = 'SCORE ' + String(score).padStart(3,'0');
    document.getElementById('question-text').textContent = data.q;

    const wrap = document.getElementById('options-wrap');
    wrap.innerHTML = '';
    const letters = ['A','B','C','D'];
    data.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.innerHTML = '<span class="option-letter">' + letters[idx] + '</span><span>' + opt + '</span>';
      btn.addEventListener('click', () => selectAnswer(idx));
      wrap.appendChild(btn);
    });

    startTimer();
  }

  function startTimer(){
    clearInterval(timerInterval);
    timeLeft = TIME_PER_Q;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0){
        clearInterval(timerInterval);
        if (!answered) selectAnswer(-1);
      }
    }, 1000);
  }

  function updateTimerDisplay(){
    const pct = Math.max(0, (timeLeft / TIME_PER_Q) * 100);
    const fill = document.getElementById('timer-fill');
    fill.style.width = pct + '%';
    if (timeLeft <= 3){
      fill.style.backgroundColor = 'var(--coral)';
    } else if (timeLeft <= 6){
      fill.style.backgroundColor = 'var(--amber)';
    } else {
      fill.style.backgroundColor = 'var(--teal)';
    }
    document.getElementById('timer-num').textContent = Math.max(0,timeLeft) + 's';
  }

  function selectAnswer(idx){
    if (answered) return;
    answered = true;
    clearInterval(timerInterval);

    const data = QUESTIONS[current];
    const buttons = document.querySelectorAll('#options-wrap .option');
    buttons.forEach(b => b.disabled = true);

    const isCorrect = idx === data.correct;
    if (isCorrect){
      score += POINTS_PER_Q;
      correctCount++;
      buttons[idx].classList.add('correct');
    } else {
      wrongCount++;
      if (idx >= 0) buttons[idx].classList.add('wrong');
      buttons[data.correct].classList.add('correct');
    }

    document.getElementById('score-label').textContent = 'SCORE ' + String(score).padStart(3,'0');

    setTimeout(() => {
      current++;
      if (current < QUESTIONS.length){
        showQuestion();
      } else {
        endQuiz();
      }
    }, 1100);
  }

  function endQuiz(){
    const maxScore = QUESTIONS.length * POINTS_PER_Q;
    document.getElementById('result-score').textContent = String(score).padStart(3,'0');
    document.getElementById('result-sub').textContent = 'out of ' + maxScore;
    document.getElementById('result-correct').textContent = correctCount;
    document.getElementById('result-wrong').textContent = wrongCount;
    showScreen('results');
  }

  document.getElementById('btn-start').addEventListener('click', startQuiz);
  document.getElementById('btn-restart').addEventListener('click', startQuiz);

  document.addEventListener('keydown', (e) => {
    if (screens.quiz.classList.contains('active') && !answered){
      if (['1','2','3','4'].includes(e.key)){
        const idx = parseInt(e.key,10) - 1;
        const buttons = document.querySelectorAll('#options-wrap .option');
        if (buttons[idx]) selectAnswer(idx);
      }
    }
    if (e.key === 'Enter'){
      if (screens.start.classList.contains('active')) startQuiz();
      if (screens.results.classList.contains('active')) startQuiz();
    }
  });
</script>
</body>
</html>
